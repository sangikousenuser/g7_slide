<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G7 Summit Animation</title>
    <style>
        :root {
            /* 基本カラーパレット（白背景用） */
            --bg-main: #ffffff;
            --bg-gradient-center: #f8fafc;
            --table-dark: #cbd5e1;
            --table-light: #f1f5f9;
            --accent-blue: #0284c7;
            --accent-gold: #d97706;
            --text-main: #1e293b;
            
            /* 円卓から各国までの距離（レスポンシブ対応） */
            --radius: 220px;
        }

        @media (max-width: 600px) {
            :root {
                --radius: 140px;
            }
            .table-container {
                width: 140px !important;
                height: 140px !important;
            }
            .g7-logo {
                font-size: 2rem !important;
            }
            .member {
                width: 60px !important;
                height: 60px !important;
            }
            .member .flag {
                font-size: 1.5rem !important;
            }
            .member .name {
                font-size: 0.55rem !important;
            }
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            /* 国際会議風の明るい背景 */
            background-image: radial-gradient(circle at center, var(--bg-gradient-center) 0%, var(--bg-main) 100%);
        }

        /* 背景の薄いグリッド線 */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(2, 132, 199, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(2, 132, 199, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 2rem;
            z-index: 10;
            opacity: 0;
            text-shadow: 0 0 10px rgba(0,0,0,0.1);
            animation: fadeInDown 1s ease forwards 0.5s;
        }

        .scene {
            position: relative;
            width: 100vw;
            height: 60vh;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* 中央の円卓 */
        .table-container {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--table-light), var(--table-dark));
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(0,0,0,0.05),
                inset 0 2px 5px rgba(255,255,255,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(0);
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 1.2s;
        }

        /* 円卓から広がる波紋エフェクト */
        .table-container::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(2, 132, 199, 0.3);
            animation: ripple 4s linear infinite 2.5s;
            opacity: 0;
        }

        .g7-logo {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(2, 132, 199, 0.3);
            opacity: 0;
            animation: pulseGlow 2s ease forwards 2.5s;
        }

        /* 各国のコンテナ基準点 */
        .country-slots {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
        }

        /* 各国の代表要素 */
        .member {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(2, 132, 199, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0;
            
            /* CSS変数の角度(--angle)と距離(--radius)を使って円形に配置しつつ、要素自体は水平を保つ */
            transform: translate(-50%, -50%) rotate(var(--angle)) translate(0px) rotate(calc(-1 * var(--angle))) scale(0);
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .member:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.3);
            cursor: pointer;
            z-index: 20;
            /* ホバー時に少し浮き上がる */
            transform: translate(-50%, -50%) rotate(var(--angle)) translate(var(--radius)) rotate(calc(-1 * var(--angle))) scale(1.15) !important;
        }

        .member .flag {
            font-size: 2rem;
            line-height: 1.2;
        }

        .member .name {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #475569;
        }

        /* 各国から中央へ伸びる光の線（装飾） */
        .member::before {
            content: '';
            position: absolute;
            width: calc(var(--radius) - 50px);
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(2, 132, 199, 0.2) 100%);
            top: 50%;
            right: 50%; /* 中心から自分への線 */
            transform-origin: right center;
            transform: translateY(-50%) rotate(var(--angle));
            z-index: -1;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            /* JSでanimation-delayを設定 */
        }

        /* --- アニメーション定義 --- */
        @keyframes fadeInDown {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0; transform: scale(0.8); text-shadow: 0 0 0px transparent; }
            50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 20px rgba(2, 132, 199, 0.4); }
            100% { opacity: 1; transform: scale(1); text-shadow: 0 0 10px rgba(2, 132, 199, 0.2); }
        }

        @keyframes popInMember {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) rotate(var(--angle)) translate(0px) rotate(calc(-1 * var(--angle))) scale(0);
            }
            60% { 
                opacity: 1; 
                transform: translate(-50%, -50%) rotate(var(--angle)) translate(calc(var(--radius) * 1.1)) rotate(calc(-1 * var(--angle))) scale(1.1);
            }
            100% { 
                opacity: 1; 
                transform: translate(-50%, -50%) rotate(var(--angle)) translate(var(--radius)) rotate(calc(-1 * var(--angle))) scale(1);
            }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <h1 id="title">G7 SUMMIT</h1>
    
    <div class="scene" id="scene">
        <div class="table-container" id="table">
            <div class="g7-logo">G7</div>
        </div>

        <div class="country-slots" id="members">
            <!-- JavaScriptで各国の要素を挿入します -->
        </div>
    </div>

    <script>
        // G7 + EUのデータ
        const summitMembers = [
            { name: 'Japan', flag: '🇯🇵' },
            { name: 'USA', flag: '🇺🇸' },
            { name: 'UK', flag: '🇬🇧' },
            { name: 'France', flag: '🇫🇷' },
            { name: 'Germany', flag: '🇩🇪' },
            { name: 'Italy', flag: '🇮🇹' },
            { name: 'Canada', flag: '🇨🇦' },
            { name: 'EU', flag: '🇪🇺' }
        ];

        function createMembers() {
            const container = document.getElementById('members');
            container.innerHTML = '';
            
            const total = summitMembers.length;

            summitMembers.forEach((member, index) => {
                // 円周上の角度を計算 (一番上を起点として時計回り)
                const angle = (index / total) * 360 - 90;
                
                const el = document.createElement('div');
                el.className = 'member';
                // CSS変数として角度を渡す
                el.style.setProperty('--angle', `${angle}deg`);
                
                // アニメーションの遅延時間を設定（テーブル表示後に順番に登場）
                const delay = 3.0 + (index * 0.15);
                el.style.animation = `popInMember 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards ${delay}s`;
                
                // 中心へ伸びる線の遅延設定用
                const styleEl = document.createElement('style');
                styleEl.innerHTML = `.member:nth-child(${index + 1})::before { animation-delay: ${delay + 0.3}s; }`;
                document.head.appendChild(styleEl);

                el.innerHTML = `
                    <div class="flag">${member.flag}</div>
                    <div class="name">${member.name}</div>
                `;
                container.appendChild(el);
            });
        }

        // 初期化
        createMembers();
    </script>
</body>
</html>
